<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="terminal-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d3f"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="120" fill="#e94560" opacity="0.06"/>
  <circle cx="1100" cy="300" r="80" fill="#ff6b6b" opacity="0.05"/>
  <circle cx="150" cy="350" r="100" fill="#e94560" opacity="0.04"/>

  <!-- Terminal window -->
  <g transform="translate(680, 90)" filter="url(#shadow)">
    <rect width="440" height="220" rx="12" fill="url(#terminal-bg)" stroke="#3d3d5c" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="440" height="36" rx="12" fill="#2d2d3f"/>
    <rect y="24" width="440" height="12" fill="#2d2d3f"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <!-- Terminal title -->
    <text x="220" y="22" fill="#8888aa" font-family="SF Mono, Monaco, Consolas, monospace" font-size="12" text-anchor="middle">claude-code</text>

    <!-- Terminal content -->
    <g font-family="SF Mono, Monaco, Consolas, monospace" font-size="13">
      <text x="20" y="65" fill="#7aa2f7">$</text>
      <text x="36" y="65" fill="#c0caf5"> claude</text>

      <text x="20" y="90" fill="#565f89">// Claude Code is ready</text>

      <text x="20" y="120" fill="#7aa2f7">$</text>
      <text x="36" y="120" fill="#c0caf5"> /init</text>

      <text x="20" y="145" fill="#9ece6a">✓</text>
      <text x="36" y="145" fill="#9ece6a"> CLAUDE.md created</text>

      <text x="20" y="175" fill="#7aa2f7">$</text>
      <text x="36" y="175" fill="#c0caf5"> /cost</text>

      <text x="20" y="200" fill="#e0af68">⟩</text>
      <text x="36" y="200" fill="#bb9af7"> Session tokens: 12.4k</text>
    </g>
  </g>

  <!-- Main text area -->
  <g transform="translate(60, 100)">
    <!-- Badge -->
    <rect width="160" height="28" rx="14" fill="url(#accent)" opacity="0.9"/>
    <text x="80" y="19" fill="white" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="1">LEARNING NOTES</text>

    <!-- Title -->
    <text y="80" fill="white" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700">Claude Code</text>
    <text y="130" fill="white" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700">学习笔记</text>

    <!-- Subtitle -->
    <text y="170" fill="#8888aa" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16">基于 Net Ninja《Claude Code Tutorial》系列 · 10 集完整笔记</text>

    <!-- Tags -->
    <g transform="translate(0, 195)">
      <rect width="100" height="26" rx="13" fill="#e94560" opacity="0.15" stroke="#e94560" stroke-width="1" stroke-opacity="0.3"/>
      <text x="50" y="17" fill="#ff6b6b" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" text-anchor="middle">CLAUDE.md</text>

      <rect x="112" width="70" height="26" rx="13" fill="#9ece6a" opacity="0.15" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
      <text x="147" y="17" fill="#9ece6a" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" text-anchor="middle">MCP</text>

      <rect x="194" width="100" height="26" rx="13" fill="#7aa2f7" opacity="0.15" stroke="#7aa2f7" stroke-width="1" stroke-opacity="0.3"/>
      <text x="244" y="17" fill="#7aa2f7" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" text-anchor="middle">Subagents</text>

      <rect x="306" width="90" height="26" rx="13" fill="#e0af68" opacity="0.15" stroke="#e0af68" stroke-width="1" stroke-opacity="0.3"/>
      <text x="351" y="17" fill="#e0af68" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" text-anchor="middle">Workflow</text>

      <rect x="408" width="80" height="26" rx="13" fill="#bb9af7" opacity="0.15" stroke="#bb9af7" stroke-width="1" stroke-opacity="0.3"/>
      <text x="448" y="17" fill="#bb9af7" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" text-anchor="middle">GitHub</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect y="394" width="1200" height="6" fill="url(#accent)"/>
</svg>
